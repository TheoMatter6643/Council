<body>

<h1>Gambling</h1>

<!-- SLOT MACHINE -->
<h3 class="section-title">Slot Machine</h3>

<input id="playerName" placeholder="Enter your name" class="text-input">

<h2 id="coins" class="coins-display">Coins: 100</h2>
<h3 id="dailyRewardMessage" class="daily-reward"></h3>

<div id="slot-machine">
  <div class="reel" id="reel1">⭐</div>
  <div class="reel" id="reel2">⭐</div>
  <div class="reel" id="reel3">⭐</div>
</div>

<button id="spin" class="button">Spin</button>

<div id="result" class="result-box"></div>

<!-- BLACKJACK -->
<h3 class="section-title">Blackjack</h3>

<div id="blackjackRules" class="rules-box">
  <h3>Blackjack Rules</h3>
  <p>- Beat the dealer without going over 21.</p>
  <p>- Blackjack (A + 10-card) pays 3:2.</p>
  <p>- Normal win pays 1:1.</p>
  <p>- Tie returns your bet.</p>
  <p>- Dealer shows one card until you stand.</p>
</div>

<div id="blackjack" class="blackjack-container">

  <input id="bjBet" type="number" min="1" value="10" class="text-input">

  <button id="bjStart" class="button">Start Blackjack</button>

  <div id="bjStatus" class="result-box"></div>

  <div id="bjPlayer" class="result-box"></div>
  <div id="bjDealer" class="result-box"></div>

  <div class="bj-buttons">
    <button id="bjHit" class="button">Hit</button>
    <button id="bjStand" class="button">Stand</button>
  </div>

</div>
